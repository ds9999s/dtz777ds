teil4: {
    title: "Teil 4: Hausordnung",
    infoBox: `
        <div class="bg-white border-2 border-gray-700 rounded-lg p-4 my-2 text-xs text-gray-800 space-y-3 shadow-sm">
            <h3 class="text-sm font-bold text-blue-900 border-b border-gray-300 pb-1 text-center">Hausordnung</h3>
            <p>Die Hausordnung regelt das Zusammenleben aller Bewohner des Hauses. Sie enthält Rechte und Pflichten.</p>
            
            <div>
                <h4 class="font-bold text-gray-900">Lärm</h4>
                <p>In der Zeit von 13.00 bis 15.00 Uhr sowie zwischen 22.00 und 6.00 Uhr dürfen, Radios, Fernseher, CD-Player etc. nur auf Zimmerlautstärke gestellt werden. Das Spielen von Instrumenten ist während der Mittagsruhe (13.00 bis 15.00 Uhr) und zwischen 19.00 und 8.00 Uhr verboten. Bei Feiern sollten Sie alle Nachbarn rechtzeitig informieren.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">Kinder</h4>
                <p>Kinder dürfen sich nicht im Keller, in der Tiefgarage oder im Waschkeller aufhalten. Der Spielplatz und der Sandkasten müssen von den Eltern saubergemacht werden. Die Eltern müssen auch darauf achten, dass das benutzte Spielzeug weggeräumt wird.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">Sicherheit</h4>
                <p>Haus- und Kellertüren müssen in der Zeit von 22.00 bis 6.00 Uhr geschlossen sein. Im Treppenhaus und Hausflur dürfen keine Fahrräder, Kinderwagen, Rollstühle etc. abgestellt werden, da das Treppenhaus und der Hausflur Fluchtwege sind (z. B. bei einem Brand). Das Grillen mit Holzkohle ist auf den Balkonen nicht erlaubt. Zum Grillen gibt es einen Grillplatz in der Nähe des Hauses.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">Reinigung</h4>
                <p>Alle Mieter müssen abwechselnd Flur, Treppen und Fenster putzen. Müll darf nur in die Mülltonnen geworfen werden. Beim Gießen von Blumen darf das Wasser nicht auf die Fenster und Balkone anderer Mieter laufen.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">Lüften</h4>
                <p>Die Wohnung muss auch im Winter ausreichend gelüftet werden. Lüften Sie aber nach Möglichkeit nur kurz. Fahrräder dürfen nur im Fahrradkeller, Autos nur auf den vorgesehenen Parkplätzen abgestellt werden.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">Haustiere</h4>
                <p>Haustiere dürfen sich nur zusammen mit ihrem Besitzer im Garten oder im Treppenhaus aufhalten. Auf Spielplätzen dürfen sich keine Haustiere aufhalten.</p>
            </div>
        </div>

            <div>
                <h4 class="font-bold text-gray-900">§1 Aufenthalt der Patienten</h4>
                <p>Die Patienten sollten während der Essens- und der Ruhezeiten in ihrem Zimmer bleiben. Patienten sollten immer passende Kleidung tragen (im Krankenzimmer z. B. Schlafanzug oder Bademantel, im Café Freizeitkleidung). Wenn Patienten das Krankenhaus verlassen wollen, müssen sie den Arzt um Erlaubnis fragen.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">§2 Verhalten</h4>
                <p>Alle Patienten und Besucher sollen Rücksicht nehmen. Im gesamten Krankenhaus gibt es ein Rauchverbot, auch auf den Toiletten! Auch Alkohol ist im ganzen Krankenhaus verboten. Da Handys die Funktion medizinischer Geräte stören können, ist ihre Benutzung im Krankenhaus nicht erlaubt. Telefonieren Sie bitte nur mit dem Telefon in Ihrem Krankenzimmer. Im Krankenzimmer dürfen Sie keine eigenen Elektrogeräte wie z. B. Wasserkocher oder Fernseher benutzen. Die Verwendung von Notebooks und Tablet-Computern ist erlaubt.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">§3 Persönliche Gegenstände</h4>
                <p>Patienten können persönliche Gegenstände mit in das Krankenzimmer nehmen. Nutzen Sie auch die abschließbaren Schränke in den Krankenzimmern. Beachten Sie aber, dass alle Gegenstände im Krankenzimmer nicht versichert sind. Wertvolle Gegenstände (Bargeld, Schmuck etc.) sollten Patienten bei der Verwaltung abgeben. Patienten erhalten dann eine Quittung und bekommen diese Gegenstände zurück, wenn sie sie wieder abholen.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">§4 Medikamente</h4>
                <p>Die Medikamente werden von den Ärzten verschrieben und von den Pflegepersonen ausgegeben. Wenn Patienten andere Medikamente nehmen wollen oder müssen, müssen sie unbedingt zuerst den Arzt oder das Pflegepersonal informieren!</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">§5 Mahlzeiten</h4>
                <p>Jeder Patient bekommt einen Essensplan. Sie können aus drei Menüs wählen. Jeden Tag wird auch ein vegetarisches Essen angeboten. Wenn Patienten Speisen oder Getränke von ihren Besuchern bekommen, sollten sie zuerst den Arzt oder die Pflegepersonen fragen, ob sie diese Speisen oder Getränke auch essen bzw. trinken dürfen.</p>

teil4: {
    title: "Teil 4: Ernährungs-Tipps fit für den Arbeitstag",
    infoBox: `
        <div class="bg-white border-2 border-blue-900 rounded-lg p-4 my-2 text-xs text-gray-800 space-y-3 shadow-sm">
            <h3 class="text-sm font-bold text-blue-900 border-b border-blue-200 pb-1 text-center">
                Ernährungs-Tipps fit für den Arbeitstag
            </h3>
            <p class="font-semibold text-gray-700">
                Die Deutsche Gesellschaft für Ernährung (DGE) e. V. gibt Tipps, wie Sie sich trotz Stress und Zeitmangel im Job gesund ernähren können.
            </p>
            
            <div>
                <h4 class="font-bold text-gray-900">Zweimal frühstücken</h4>
                <p>Wer frühmorgens nicht viel zu sich nehmen kann, sollte dies nach zwei bis drei Stunden nachholen. Essen Sie einmal großzügiger z. B. mit Müsli oder Vollkornbrot, einmal leichter z. B. mit Obst oder Joghurt. So erhalten auch „Morgenmuffel“ genug Energie für den Tagesanfang.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">Zwischenmahlzeiten verhindern Leistungstiefs</h4>
                <p>Verteilen Sie kleinere Mahlzeiten aus Obst, fettarmen Milchprodukten oder dünn belegten Broten über den Tag. Das erhält die Konzentrationsfähigkeit, belastet Verdauungsorgane und Kreislauf wenig und vermeidet Heißhunger.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">Essen Sie nicht nebenbei</h4>
                <p>In einer kleinen Pause können Sie Ihr Essen besser genießen. Sie fühlen sich nicht nur satt, sondern auch wohl. Außerdem verlieren Sie nicht so schnell den Überblick darüber, wie viel Sie gegessen haben. Das hilft, das Körpergewicht zu halten.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">Fastfood sinnvoll ergänzen</h4>
                <p>Das Essen an der Imbissbude ist meist einseitig, salzig und fett. Wer hier isst, sollte die fehlenden Vitamine, Mineral- und Ballaststoffe zwischendurch oder abends durch Gemüse, Obst, Vollkorn- und Milchprodukte ergänzen.</p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">Mitgebrachtes kann eine gute Alternative sein</h4>
                <p>Wer beim Kochen regelmäßig eine Portion einfriert oder am nächsten Tag zur Arbeit mitnimmt, spart nicht nur Geld. Man braucht in der Pause auch nicht in der Warteschlange vor der Imbissbude zu stehen.</p>
            </div>
        </div>
    `,

teil4: {
    title: "Teil 4: Sicherheitshinweise für „Digitalen Satelliten Receiver DSR 302“",
    infoBox: `
        <div class="bg-white border-2 border-blue-900 rounded-lg p-4 my-2 text-xs text-gray-800 space-y-3 shadow-sm leading-relaxed">
            <h3 class="text-sm font-bold text-blue-900 border-b border-blue-200 pb-1 text-center">
                Sicherheitshinweise für „Digitalen Satelliten Receiver DSR 302“
            </h3>
            
            <p class="font-semibold text-gray-900">Bitte lesen Sie diese Sicherheitshinweise sorgfältig, bevor Sie das Gerät in Betrieb nehmen!</p>
            
            <div>
                <h4 class="font-bold text-gray-900">-Netzspannung und Anschluss</h4>
                <p>
                    Betreiben Sie das Gerät nur mit der auf dem Gehäuse angegebenen Spannung! Bei Gewitter oder längerer Abwesenheit, ziehen Sie den Netzstecker des Gerätes aus der Wandsteckdose. Trennen Sie auch Verbindungen zur Antenne, damit es nicht zu Beschädigungen Gewitter kommen kann.
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Belüftung</h4>
                <p>
                    Achten Sie darauf, keine Gegenstände auf das Gerät zu legen, um die Lüftungsschlitze nicht zu verdecken. Oberhalb und zur Seite soll das Gerät mindestens 10 cm Abstand zu allen anderen Gegenständen haben, damit die Wärme problemlos abgeleitet werden kann. Achten Sie darauf, dass keine Gegenstände in die Lüftungsschlitze gelangen können. Es besteht Lebensgefahr durch einen elektrischen Stromschlag!
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Aufstellungsort</h4>
                <p>
                    Stellen Sie den Gerät auf eine gerade Oberfläche. Stellen Sie das Gerät nicht in die Nähe einer Heizung und setzen Sie es auch nicht der direkten Sonneneinstrahlung aus. Das Gerät entwickelt Wärme, daher kann es zu Verfärbungen von Oberflächen kommen. Stellen Sie das Gerät deshalb auf eine geeignete Unterlage!
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Feuchtigkeit und Reinigung</h4>
                <p>
                    Sorgen Sie dafür, dass das Gerät nicht mit Wasser (z. B. Kondens- oder Spritzwasser) in Kontakt kommt und keine Feuchtigkeit eindringt. Vor dem Reinigen des Gerätes ziehen Sie den Stecker des Netzgerätes. Benutzen Sie ein trockenes oder nur leicht angefeuchtetes Tuch.
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Reparatur</h4>
                <p>
                    Öffnen Sie niemals selbst das Gerät: Auch ohne Anschluss an das Stromnetz besteht Lebensgefahr durch einen elektrischen Stromschlag. Reparaturen dürfen deshalb nur von Fachpersonal durchgeführt werden. Durch einen unsachgemäßen Fremdeingriff verlieren Sie den Garantieanspruch!
                </p>
            </div>
        </div>

teil4: {
    title: "Teil 4: Mittagsbetreuung an der Grundschule",
    infoBox: `
        <div class="bg-white border-2 border-blue-900 rounded-lg p-4 my-2 text-xs text-gray-800 space-y-3 shadow-sm leading-relaxed">
            <h3 class="text-sm font-bold text-blue-900 border-b border-blue-200 pb-1 text-center">
                Mittagsbetreuung an der Grundschule
            </h3>
            
            <p class="font-semibold text-gray-900">Elterninformation</p>
            
            <p>
                Dieses Angebot wird von der Stadt organisiert und findet ausschließlich während der regulären Schulzeiten statt. Die Betreuung deckt die Wochentage von Montag bis Freitag ab, jeweils in der Zeit von 11:00 bis 14:00 Uhr. Angemeldet werden können Grundschulkinder der Klassenstufen 1 bis 4.
            </p>
            
            <div>
                <h4 class="font-bold text-gray-900">-Gebühren</h4>
                <p>
                    Die monatlichen Kosten richten sich flexibel nach der Anzahl der gebuchten wöchentlichen Betreuungstage: 5 Tage kosten 57,00 €, 4 Tage 45,60 €, 3 Tage 34,20 €, 2 Tage 22,80 € und ein einzelner Tag pro Woche liegt bei 11,40 €. Familien mit mehreren Kindern profitieren von Ermäßigungen: Bei zwei Kindern verringert sich der Betrag um 15 %, bei drei Kindern um 50 %, und ab dem vierten Kind entfallen die Gebühren komplett. Die Zahlungen sind durchgehend für das gesamte Jahr (12 Monate) zu leisten.
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Abwesenheit</h4>
                <p>
                    Der monatliche Beitrag bleibt in voller Höhe bestehen, selbst wenn das Kind an einzelnen Tagen nicht anwesend sein kann. Dies gilt ausdrücklich auch im Krankheitsfall des Kindes.
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Aktivitäten</h4>
                <p>
                    Das Konzept setzt neben der reinen Aufsichtspflicht vor allem auf die Förderung des sozialen Miteinanders. Die gemeinsame Zeit ist bewusst nicht als Arbeitszeit gestaltet, sondern rückt Erholung, Freizeit und Spaß in den Fokus. Die Kinder können spielen, basteln sowie frei drinnen und draußen aktiv sein. Um Geborgenheit zu vermitteln, werden verlässliche Gruppenregeln vereinbart. Jahreszeitliche Feste stärken zudem die Gemeinschaft.
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Hausaufgaben</h4>
                <p>
                    Es handelt sich ausdrücklich nicht um eine geführte Hausaufgabenbetreuung. Die Kinder haben jedoch die Möglichkeit, ihre Aufgaben eigenständig vor Ort zu erledigen.
                </p>
            </div>
        </div>

teil4: {
    title: "Teil 4: Die Kindertagesstätte Süd informiert die Eltern:",

            <h3 class="text-sm font-bold text-blue-900 border-b border-blue-200 pb-1 text-center">

            </h3>
            
            <div>
                <h4 class="font-bold text-gray-900">-Wann und wo findet das gemeinsame Frühstück statt?</h4>
                <p>
                    <b>Alle Kinder gehen gegen 9.00 Uhr gemeinsam in den Speiseraum frühstücken,</b> Dort finden die Kinder ein gesundes und abwechslungsreiches Frühstück.
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Was wird zum Frühstück angeboten?</h4>
                <p>
                    Da das Frühstück für Kinder ein wichtiger Baustein in der Ernährung ist, bieten wir Ihren Kindern folgende Nahrungsmittel an: selbstgebackenes Brot, Brötchen, Knäckebrot, Obst und frisches Gemüse, Müsli, Cornflakes, Marmelade, Honig, Wurst und Käse und manchmal auch Schokocreme. Wie versuchen das Frühstück innerhalb einer Woche mit diesen Nahrungsmitteln abwechslungsreich zu gestalten, Zum Trinken gibt es ungesüßten Tee, Wasser und Milch oder Kakao.
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Wo wird das Mittagessen zubereitet?</h4>
                <p>
                    Zum Mittagessen gibt es ein Hauptgericht, Salat und eine Nachspeise oder Obst. Das Essen wird täglich frisch bei uns im Haus zubereitet.
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Welche Lebensmittel werden für das Mittagessen verwendet?</h4>
                <p>
                    Für das Mittagessen verwenden wir vor allem Lebensmittel aus der Umgebung und Bio-Produkte. Auf das eine oder andere Lebensmittel aus der Tiefkühltruhe können auch wir allerdings nicht verzichten. <b>Für Kinder darf etwas Süßes nicht ganz fehlen, deshalb gibt es ab und zu süßen Quark, Pudding, Waffeln, Muffins oder Eis zum Nachtisch.</b>
                </p>
            </div>
            
            <div>
                <h4 class="font-bold text-gray-900">-Wer bekommt einen Nachmittagssnack?</h4>
                <p>
                    <b>Für die Kinder, die bis 17.00 Uhr in unserem Haus angemeldet sind, wird gegen 15,00 Uhr am Nachmittag noch einmal ein kleiner imbiss gereicht.</b> Dazu werden überwiegend Obst und Gemüse oder belegte Brote angeboten. Manchmal gibt es auch Kuchen bzw. etwas anderes Süßes,
                </p>
            </div>

           ЛОГІКА ВІДОБРАЖЕННЯ ТА НАВІГАЦІЇ
           ========================================================================== */
        let currentCategory = "";
        let currentTest = null;
        let userAnswers = {};

        function goBack() {
            const screenTestContent = document.getElementById('screenTestContent');
            const screenTestList = document.getElementById('screenTestList');
            const screenMainMenu = document.getElementById('screenMainMenu');

            if (!screenTestContent.classList.contains('hidden')) {
                screenTestContent.classList.add('hidden');
                screenTestList.classList.remove('hidden');
                document.getElementById('mainAudio').pause();
            } else if (!screenTestList.classList.contains('hidden')) {
                screenTestList.classList.add('hidden');
                screenMainMenu.classList.remove('hidden');
                document.getElementById('backBtn').classList.add('hidden');
            }
        }

        function openCategory(catKey) {
            currentCategory = catKey;
            document.getElementById('screenMainMenu').classList.add('hidden');
            document.getElementById('screenTestList').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('hidden');
            document.getElementById('categoryTitle').innerText = catKey;

            const grid = document.getElementById('testGrid');
            grid.innerHTML = "";

            const tests = examData[catKey] || [];
            if(tests.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-gray-400 py-4">Тести ще додаються...</p>`;
                return;
            }

            tests.forEach((test, index) => {
                grid.innerHTML += `
                    <button onclick="loadTest('${catKey}', ${index})" class="p-4 bg-white border border-gray-200 rounded-xl shadow-sm hover:border-blue-500 hover:bg-blue-50 font-bold text-gray-800 text-center transition cursor-pointer">
                        ${catKey === 'Schreiben' || catKey === 'Sprechen' ? '📚' : '📝'} ${test.title}
                    </button>
                `;
            });
        }

        function loadTest(catKey, testIndex) {
            currentTest = examData[catKey][testIndex];
            userAnswers = {};

            document.getElementById('screenTestList').classList.add('hidden');
            document.getElementById('screenTestContent').classList.remove('hidden');

            document.getElementById('testMeta').innerText = `${currentTest.title}`;

            const audioBox = document.getElementById('audioPlayerContainer');
            const audioEl = document.getElementById('mainAudio');
            const submitContainer = document.getElementById('submitContainer');

            if (catKey === 'Horen') {
                submitContainer.classList.remove('hidden');
                document.getElementById('taskCountBadge').innerText = `20 завдань`;
                if (currentTest.audioUrl) {
                    audioBox.classList.remove('hidden');
                    document.getElementById('audioSource').src = currentTest.audioUrl;
                    audioEl.load();
                }
                renderHorenTest();
            } else if (catKey === 'Lesen') {
                submitContainer.classList.remove('hidden');
                document.getElementById('taskCountBadge').innerText = `25 завдань (21-45)`;
                audioBox.classList.add('hidden');
                audioEl.pause();
                renderLesenTest();
            } else if (catKey === 'Schreiben') {
                submitContainer.classList.add('hidden'); // Кнопка перевірки не потрібна для довідника
                document.getElementById('taskCountBadge').innerText = `Довідник B1`;
                audioBox.classList.add('hidden');
                audioEl.pause();
                renderSchreibenGuide();
            } else if (catKey === 'Sprechen') {
                submitContainer.classList.add('hidden'); // Кнопка перевірки не потрібна для Sprechen
                document.getElementById('taskCountBadge').innerText = `Усна частина B1`;
                audioBox.classList.add('hidden');
                audioEl.pause();
                renderSprechenGuide();
            }
        }

        /* --------------------------------------------------------------------------
           РЕНДЕР HÖREN
           -------------------------------------------------------------------------- */
        function renderHorenTest() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = "";

            ['teil1', 'teil2'].forEach((tKey, idx) => {
                if(currentTest[tKey]) {
                    container.innerHTML += `<div class="bg-blue-600 text-white p-2.5 rounded-lg text-xs font-bold uppercase">Teil ${idx+1}</div>`;
                    currentTest[tKey].forEach(q => {
                        container.innerHTML += buildAbcCard(q.num, q.question, q.opts);
                    });
                }
            });

            if(currentTest.teil3) {
                container.innerHTML += `<div class="bg-blue-600 text-white p-2.5 rounded-lg text-xs font-bold uppercase mt-6">Teil 3 (Aufgaben 10–17)</div>`;
                currentTest.teil3.forEach(pair => {
                    container.innerHTML += `
                        <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm space-y-3" id="q_box_${pair.rfNum}">
                            <div class="font-bold text-gray-900 text-sm">${pair.rfNum}. ${pair.statement}</div>
                            <div class="flex gap-2 text-xs">
                                <button onclick="selectRf(${pair.rfNum}, 'richtig', this)" class="rf-btn-${pair.rfNum} flex-1 py-2 border rounded-lg border-gray-200 hover:bg-gray-50 font-semibold cursor-pointer">Richtig</button>
                                <button onclick="selectRf(${pair.rfNum}, 'falsch', this)" class="rf-btn-${pair.rfNum} flex-1 py-2 border rounded-lg border-gray-200 hover:bg-gray-50 font-semibold cursor-pointer">Falsch</button>
                            </div>
                            <div id="feedback_${pair.rfNum}" class="hidden text-xs font-bold pt-1"></div>
                            <hr class="border-gray-100 my-2">
                            <div class="font-bold text-gray-900 text-sm">${pair.abcNum}. ${pair.question}</div>
                            <div class="space-y-1.5">
                                ${pair.opts.map((opt, oIdx) => `
                                    <label id="opt_lbl_${pair.abcNum}_${oIdx}" class="flex items-center p-2 border border-gray-200 rounded-lg text-xs hover:bg-gray-50 cursor-pointer">
                                        <input type="radio" name="opt_${pair.abcNum}" value="${oIdx}" onclick="selectOpt(${pair.abcNum}, ${oIdx})" class="h-4 w-4 text-blue-600">
                                        <span class="ml-2 text-gray-800">${opt}</span>
                                    </label>
                                `).join('')}
                            </div>
                            <div id="feedback_${pair.abcNum}" class="hidden text-xs font-bold pt-1"></div>
                        </div>
                    `;
                });
            }

            if(currentTest.teil4) {
                container.innerHTML += `
                    <div class="bg-blue-600 text-white p-2.5 rounded-lg text-xs font-bold uppercase mt-6">Teil 4 (Aufgaben 18–20)</div>
                    <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm space-y-3">
                        <div class="text-xs text-gray-600 bg-gray-50 p-3 rounded-lg border border-gray-200 space-y-1">
                            <span class="font-bold text-gray-800">Sätze a–f:</span>
                            ${currentTest.teil4.optionsList.map(o => `<div><b>${o.letter})</b> ${o.text}</div>`).join('')}
                        </div>
                        <div class="space-y-3 pt-2">
                            ${currentTest.teil4.questions.map(q => `
                                <div class="bg-gray-50 p-2.5 rounded-lg border border-gray-200 space-y-1">
                                    <div class="flex items-center justify-between">
                                        <span class="font-bold text-sm text-gray-800">Aufgabe ${q.num}:</span>
                                        <select id="select_${q.num}" onchange="selectOpt(${q.num}, this.value)" class="bg-white border border-gray-300 text-xs rounded-md p-1.5 font-bold">
                                            <option value="">-- Виберіть літеру (a-f) --</option>
                                            ${currentTest.teil4.optionsList.map(o => `<option value="${o.letter}">${o.letter.toUpperCase()}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div id="feedback_${q.num}" class="hidden text-xs font-bold pt-1"></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        /* --------------------------------------------------------------------------
           РЕНДЕР LESEN
           -------------------------------------------------------------------------- */
        function renderLesenTest() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = "";

            if (currentTest.teil1) {
                let t1 = currentTest.teil1;
                let html = `
                    <div class="bg-blue-600 text-white p-2.5 rounded-lg text-xs font-bold uppercase">${t1.title}</div>
                    <div class="bg-blue-50 border border-blue-200 p-3.5 rounded-xl text-xs text-gray-800 leading-relaxed">${t1.infoBox}</div>
                `;
                t1.questions.forEach(q => {
                    html += buildAbcCard(q.num, q.text, q.opts);
                });
                container.innerHTML += html;
            }

            if (currentTest.teil2) {
                let t2 = currentTest.teil2;
                let html = `
                    <div class="bg-blue-600 text-white p-2.5 rounded-lg text-xs font-bold uppercase mt-6">${t2.title}</div>
                    <div class="bg-blue-50 border border-blue-200 p-3.5 rounded-xl text-xs text-gray-800 leading-relaxed">${t2.infoBox}</div>
                    <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm space-y-3 mt-3">
                `;
                t2.questions.forEach(q => {
                    html += `
                        <div class="bg-gray-50 p-2.5 rounded-lg border border-gray-200 text-xs space-y-1">
                            <div class="flex items-center justify-between">
                                <span class="font-bold text-gray-800">${q.text}</span>
                                <select id="select_${q.num}" onchange="selectOpt(${q.num}, this.value)" class="bg-white border border-gray-300 text-xs rounded-md p-1.5 font-bold">
                                    <option value="">-- Вибір --</option>
                                    ${['a','b','c','d','e','f','g','h','x'].map(l => `<option value="${l}">${l.toUpperCase()}</option>`).join('')}
                                </select>
                            </div>
                            <div id="feedback_${q.num}" class="hidden text-xs font-bold pt-1"></div>
                        </div>
                    `;
                });
                html += `</div>`;
                container.innerHTML += html;
            }

            if (currentTest.teil3) {
                let t3 = currentTest.teil3;
                let html = `<div class="bg-blue-600 text-white p-2.5 rounded-lg text-xs font-bold uppercase mt-6">${t3.title}</div>`;
                t3.items.forEach(item => {
                    html += `
                        <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm space-y-3 mt-3">
                            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 text-xs text-gray-800">${item.text}</div>
                            
                            <div class="font-bold text-gray-900 text-sm pt-1">${item.q1.text}</div>
                            <div class="flex gap-2 text-xs">
                                <button onclick="selectRf(${item.q1.num}, 'richtig', this)" class="rf-btn-${item.q1.num} flex-1 py-2 border rounded-lg border-gray-200 hover:bg-gray-50 font-semibold cursor-pointer">Richtig</button>
                                <button onclick="selectRf(${item.q1.num}, 'falsch', this)" class="rf-btn-${item.q1.num} flex-1 py-2 border rounded-lg border-gray-200 hover:bg-gray-50 font-semibold cursor-pointer">Falsch</button>
                            </div>
                            <div id="feedback_${item.q1.num}" class="hidden text-xs font-bold pt-1"></div>

                            <hr class="border-gray-100 my-2">

                            <div class="font-bold text-gray-900 text-sm">${item.q2.text}</div>
                            <div class="space-y-1.5">
                                ${item.q2.opts.map((opt, oIdx) => `
                                    <label id="opt_lbl_${item.q2.num}_${oIdx}" class="flex items-center p-2 border border-gray-200 rounded-lg text-xs hover:bg-gray-50 cursor-pointer">
                                        <input type="radio" name="opt_${item.q2.num}" value="${oIdx}" onclick="selectOpt(${item.q2.num}, ${oIdx})" class="h-4 w-4 text-blue-600">
                                        <span class="ml-2 text-gray-800">${opt}</span>
                                    </label>
                                `).join('')}
                            </div>
                            <div id="feedback_${item.q2.num}" class="hidden text-xs font-bold pt-1"></div>
                        </div>
                    `;
                });
                container.innerHTML += html;
            }

            if (currentTest.teil4) {
                let t4 = currentTest.teil4;
                let html = `
                    <div class="bg-blue-600 text-white p-2.5 rounded-lg text-xs font-bold uppercase mt-6">${t4.title}</div>
                    <div class="bg-blue-50 border border-blue-200 p-3.5 rounded-xl text-xs text-gray-800 leading-relaxed">${t4.infoBox}</div>
                `;
                t4.questions.forEach(q => {
                    html += `
                        <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm space-y-2 mt-3">
                            <div class="font-bold text-gray-900 text-sm">${q.text}</div>
                            <div class="flex gap-2 text-xs">
                                <button onclick="selectRf(${q.num}, 'richtig', this)" class="rf-btn-${q.num} flex-1 py-2 border rounded-lg border-gray-200 hover:bg-gray-50 font-semibold cursor-pointer">Richtig</button>
                                <button onclick="selectRf(${q.num}, 'falsch', this)" class="rf-btn-${q.num} flex-1 py-2 border rounded-lg border-gray-200 hover:bg-gray-50 font-semibold cursor-pointer">Falsch</button>
                            </div>
                            <div id="feedback_${q.num}" class="hidden text-xs font-bold pt-1"></div>
                        </div>
                    `;
                });
                container.innerHTML += html;
            }

            if (currentTest.teil5) {
                let t5 = currentTest.teil5;
                let html = `
                    <div class="bg-blue-600 text-white p-2.5 rounded-lg text-xs font-bold uppercase mt-6">${t5.title}</div>
                    <div class="bg-blue-50 border border-blue-200 p-3.5 rounded-xl text-xs text-gray-800 leading-relaxed">${t5.infoBox}</div>
                `;
                t5.questions.forEach(q => {
                    html += buildAbcCard(q.num, q.text, q.opts);
                });
                container.innerHTML += html;
            }
        }

        /* --------------------------------------------------------------------------
           РЕНДЕР SPRECHEN (ДОВІДНИК ТА СЦЕНАРІЇ ДІАЛОГІВ)
           -------------------------------------------------------------------------- */
        function renderSprechenGuide() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = `
                <div class="space-y-4">
                    ${currentTest.content}
                </div>
            `;
        }

        /* --------------------------------------------------------------------------
           РЕНДЕР SCHREIBEN (ДОВІДНИК ГРАМАТИКИ ТА ПОРАД)
           -------------------------------------------------------------------------- */
        function renderSchreibenGuide() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = `
                <div class="space-y-4">
                    ${currentTest.content}
                </div>
            `;
        }

        /* --------------------------------------------------------------------------
           ДОПОМІЖНІ ФУНКЦІЇ ДЛЯ ШАБЛОНІВ
           -------------------------------------------------------------------------- */
        function buildAbcCard(num, titleText, opts) {
            return `
                <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm space-y-2 mt-3">
                    <div class="font-bold text-gray-900 text-sm">${titleText}</div>
                    <div class="space-y-1.5">
                        ${opts.map((opt, oIdx) => `
                            <label id="opt_lbl_${num}_${oIdx}" class="flex items-center p-2 border border-gray-200 rounded-lg text-xs hover:bg-gray-50 cursor-pointer">
                                <input type="radio" name="opt_${num}" value="${oIdx}" onclick="selectOpt(${num}, ${oIdx})" class="h-4 w-4 text-blue-600">
                                <span class="ml-2 text-gray-800">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div id="feedback_${num}" class="hidden text-xs font-bold pt-1"></div>
                </div>
            `;
        }

        function selectRf(qNum, val, btnEl) {
            userAnswers[qNum] = val;
            document.querySelectorAll(`.rf-btn-${qNum}`).forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                b.classList.add('border-gray-200', 'hover:bg-gray-50');
            });
            btnEl.classList.remove('border-gray-200', 'hover:bg-gray-50');
            btnEl.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
        }

        function selectOpt(qNum, val) {
            userAnswers[qNum] = val;
        }

        /* --------------------------------------------------------------------------
           ПЕРЕВІРКА ВІДПОВІДЕЙ ТА ВІЗУАЛЬНА ПІДСВІТКА
           -------------------------------------------------------------------------- */
        function checkAnswers() {
            let score = 0;
            let total = (currentCategory === 'Horen') ? 20 : 25;

            const checkAbcQuestion = (qNum, correctIdx, opts) => {
                const selectedIdx = userAnswers[qNum] !== undefined ? parseInt(userAnswers[qNum]) : null;
                const fb = document.getElementById(`feedback_${qNum}`);
                
                opts.forEach((_, idx) => {
                    const lbl = document.getElementById(`opt_lbl_${qNum}_${idx}`);
                    if (!lbl) return;
                    lbl.classList.remove('bg-green-100', 'border-green-500', 'text-green-800', 'bg-red-100', 'border-red-500', 'line-through');
                    
                    if (idx === correctIdx) {
                        lbl.classList.add('bg-green-100', 'border-green-500', 'text-green-800', 'font-bold');
                    } else if (idx === selectedIdx && selectedIdx !== correctIdx) {
                        lbl.classList.add('bg-red-100', 'border-red-500', 'line-through');
                    }
                });

                if (fb) {
                    fb.classList.remove('hidden', 'text-green-600', 'text-red-600', 'text-yellow-600');
                    if (selectedIdx === null) {
                        fb.classList.add('text-yellow-600');
                        fb.innerText = '⚠️ Ви не обрали відповідь.';
                    } else if (selectedIdx === correctIdx) {
                        score++;
                        fb.classList.add('text-green-600');
                        fb.innerText = '✅ Правильно!';
                    } else {
                        fb.classList.add('text-red-600');
                        fb.innerText = `❌ Неправильно. Правильна відповідь: ${opts[correctIdx]}`;
                    }
                }
            };

            const checkRfQuestion = (qNum, correctVal) => {
                const selectedVal = userAnswers[qNum];
                const fb = document.getElementById(`feedback_${qNum}`);
                const btns = document.querySelectorAll(`.rf-btn-${qNum}`);

                btns.forEach(btn => {
                    const isRichtigBtn = btn.innerText.trim().toLowerCase() === 'richtig';
                    const btnVal = isRichtigBtn ? 'richtig' : 'falsch';

                    btn.classList.remove('bg-green-500', 'bg-red-500', 'text-white', 'border-green-500', 'border-red-500');

                    if (btnVal === correctVal) {
                        btn.classList.add('bg-green-500', 'text-white', 'border-green-500');
                    } else if (btnVal === selectedVal && selectedVal !== correctVal) {
                        btn.classList.add('bg-red-500', 'text-white', 'border-red-500');
                    }
                });

                if (fb) {
                    fb.classList.remove('hidden', 'text-green-600', 'text-red-600', 'text-yellow-600');
                    if (!selectedVal) {
                        fb.classList.add('text-yellow-600');
                        fb.innerText = '⚠️ Ви не обрали відповідь.';
                    } else if (selectedVal === correctVal) {
                        score++;
                        fb.classList.add('text-green-600');
                        fb.innerText = '✅ Правильно!';
                    } else {
                        fb.classList.add('text-red-600');
                        fb.innerText = `❌ Неправильно. Правильно: ${correctVal.toUpperCase()}`;
                    }
                }
            };

            const checkSelectQuestion = (qNum, correctLetter) => {
                const selectedVal = userAnswers[qNum];
                const selectEl = document.getElementById(`select_${qNum}`);
                const fb = document.getElementById(`feedback_${qNum}`);

                if (selectEl) {
                    selectEl.classList.remove('border-green-500', 'border-red-500', 'bg-green-50', 'bg-red-50');
                    if (selectedVal === correctLetter) {
                        selectEl.classList.add('border-green-500', 'bg-green-50');
                    } else if (selectedVal) {
                        selectEl.classList.add('border-red-500', 'bg-red-50');
                    }
                }

                if (fb) {
                    fb.classList.remove('hidden', 'text-green-600', 'text-red-600', 'text-yellow-600');
                    if (!selectedVal) {
                        fb.classList.add('text-yellow-600');
                        fb.innerText = '⚠️ Ви не обрали літеру.';
                    } else if (selectedVal === correctLetter) {
                        score++;
                        fb.classList.add('text-green-600');
                        fb.innerText = '✅ Правильно!';
                    } else {
                        fb.classList.add('text-red-600');
                        fb.innerText = `❌ Неправильно. Правильно: ${correctLetter.toUpperCase()}`;
                    }
                }
            };

            if (currentCategory === 'Horen') {
                currentTest.teil1?.forEach(q => checkAbcQuestion(q.num, q.correct, q.opts));
                currentTest.teil2?.forEach(q => checkAbcQuestion(q.num, q.correct, q.opts));
                currentTest.teil3?.forEach(p => {
                    checkRfQuestion(p.rfNum, p.rfCorrect);
                    checkAbcQuestion(p.abcNum, p.abcCorrect, p.opts);
                });
                currentTest.teil4?.questions.forEach(q => checkSelectQuestion(q.num, q.correctLetter));

            } else if (currentCategory === 'Lesen') {
                currentTest.teil1?.questions.forEach(q => checkAbcQuestion(q.num, q.correct, q.opts));
                currentTest.teil2?.questions.forEach(q => checkSelectQuestion(q.num, q.correctLetter));
                currentTest.teil3?.items.forEach(item => {
                    checkRfQuestion(item.q1.num, item.q1.correct);
                    checkAbcQuestion(item.q2.num, item.q2.correct, item.q2.opts);
                });
                currentTest.teil4?.questions.forEach(q => checkRfQuestion(q.num, q.correct));
                currentTest.teil5?.questions.forEach(q => checkAbcQuestion(q.num, q.correct, q.opts));
            }

            alert(`Результат ${currentCategory}:\nВаш результат: ${score} з ${total}`);
        }
    </script>
</body>
</html>
