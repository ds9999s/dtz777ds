<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTZ B1 - Екзаменаційний Тренажер</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f0f2f5; color: #333; display: flex; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        
        .container { background: white; width: 100%; max-width: 1100px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #0056b3; margin-bottom: 15px; text-align: center; }
        
        /* Етап 1: Головне меню з кнопками тестіів */
        .menu-box { text-align: center; padding: 40px 20px; }
        .grid-tests { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .btn-test-select { background: #ffffff; border: 2px solid #0056b3; color: #0056b3; padding: 20px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .btn-test-select:hover { background: #0056b3; color: white; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,86,179,0.2); }
        
        /* Шапка іспиту */
        .exam-header { display: flex; justify-content: space-between; background: #0056b3; color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; }
        
        /* Роздвоєний екран (Двоколонковий макет) */
        .split-screen { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .left-panel { background: #fdfdfd; border: 1px solid #dee2e6; padding: 20px; border-radius: 8px; max-height: 650px; overflow-y: auto; }
        .right-panel { display: flex; flex-direction: column; gap: 20px; max-height: 650px; overflow-y: auto; padding-right: 5px; }
        
        /* Стилі для завдань */
        .task-card { background: #f8f9fa; border-left: 4px solid #0056b3; padding: 15px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); margin-bottom: 15px; }
        .task-card h3 { font-size: 15px; margin-bottom: 10px; color: #495057; }
        
        /* Кнопки вибору відповіді */
        .options { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .option { padding: 10px 14px; border: 1px solid #ced4da; border-radius: 6px; cursor: pointer; background: white; font-size: 14px; transition: 0.2s; }
        .option:hover { background: #f1f3f5; border-color: #0056b3; }
        .option.selected { background: #e1ecf4; border-color: #0056b3; font-weight: bold; }
        .option.correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .option.wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        
        /* Таблиці */
        .info-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .info-table th, .info-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .info-table th { background-color: #e9ecef; }

        /* Кнопки керування */
        .btn { background-color: #0056b3; color: white; border: none; padding: 12px 24px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background-color: #004085; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .nav-footer { display: flex; justify-content: space-between; border-top: 2px solid #e9ecef; padding-top: 15px; }

        /* Поле для листа */
        textarea { width: 100%; height: 250px; padding: 15px; border: 2px solid #ced4da; border-radius: 8px; font-size: 15px; resize: vertical; margin-top: 10px; }
        .ai-box { margin-top: 15px; padding: 15px; border-radius: 6px; display: none; white-space: pre-line; border-left: 5px solid; }

        /* Фінальний екран результатів */
        .result-box { text-align: center; padding: 40px 20px; }
        .badge { display: inline-block; padding: 15px 30px; font-size: 28px; font-weight: bold; border-radius: 50px; margin: 20px 0; color: white; }
        .badge.b1 { background: #28a745; box-shadow: 0 4px 15px rgba(40,167,69,0.3); }
        .badge.a2 { background: #ffc107; color: #333; box-shadow: 0 4px 15px rgba(255,193,7,0.3); }
        .badge.fail { background: #dc3545; box-shadow: 0 4px 15px rgba(220,53,69,0.3); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="step-menu" class="menu-box">
        <h1>DTZ B1 Modellprüfungen</h1>
        <p style="color: #6c757d;">Оберіть модельний тест для тренування. Кожен тест містить блоки Hören, Lesen та Schreiben.</p>
        
        <div class="grid-tests">
            <button class="btn-test-select" onclick="initExam('modeltest1')">📝 Modeltest 1</button>
            <button class="btn-test-select" onclick="initExam('modeltest2')">📝 Modeltest 2</button>
            <button class="btn-test-select" onclick="initExam('modeltest3')">📝 Modeltest 3</button>
            <button class="btn-test-select" onclick="initExam('modeltest4')">📝 Modeltest 4</button>
            <button class="btn-test-select" onclick="initExam('modeltest5')">📝 Modeltest 5</button>
            <button class="btn-test-select" onclick="initExam('modeltest6')">📝 Modeltest 6</button>
            <button class="btn-test-select" onclick="initExam('modeltest7')">📝 Modeltest 7</button>
        </div>
    </div>

    <div id="exam-block" class="hidden">
        <div class="exam-header">
            <span id="current-section-title">HÖREN & LESEN</span>
            <span id="display-test-name"></span>
        </div>

        <div id="section-hoeren" class="hidden"></div>
        <div id="section-lesen" class="hidden"></div>
        <div id="section-schreiben" class="hidden"></div>

        <div class="nav-footer">
            <button class="btn" id="btn-check-answers" onclick="revealAnswers()">Überprüfen (Перевірити)</button>
            <button class="btn" id="btn-next-step" onclick="switchSection()">Далі ➔</button>
        </div>
    </div>

    <div id="step-results" class="hidden result-box">
        <h2>Prüfungsergebnis (Результат іспиту)</h2>
        <p style="color: #6c757d; margin-top: 10px;">Блоки Hören & Lesen успішно перевірено.</p>
        
        <div style="font-size: 22px; margin-top: 20px;">
            Ваш бал: <b id="score-text" style="color: #0056b3;">0</b> із <span id="total-questions-text">0</span> правильних відповідей
        </div>

        <div id="result-badge" class="badge">B1</div>

        <p id="result-desc" style="font-size: 16px; max-width: 600px; margin: 0 auto 30px auto; line-height: 1.5; color: #495057;"></p>
        
        <button class="btn" onclick="goToMenu()">➔ В головне меню</button>
    </div>
</div>

<script>
