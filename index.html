<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTZ B1 - Екзаменаційний Тренажер</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f0f2f5; color: #333; display: flex; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        
        .container { background: white; width: 100%; max-width: 1100px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #0056b3; margin-bottom: 15px; text-align: center; }
        
        /* Етап 1: Головне меню з кнопками тестіів */
        .menu-box { text-align: center; padding: 40px 20px; }
        .grid-tests { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .btn-test-select { background: #ffffff; border: 2px solid #0056b3; color: #0056b3; padding: 20px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .btn-test-select:hover { background: #0056b3; color: white; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,86,179,0.2); }
        
        /* Шапка іспиту */
        .exam-header { display: flex; justify-content: space-between; background: #0056b3; color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; }
        
        /* Роздвоєний екран (Двоколонковий макет) */
        .split-screen { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .left-panel { background: #fdfdfd; border: 1px solid #dee2e6; padding: 20px; border-radius: 8px; max-height: 650px; overflow-y: auto; }
        .right-panel { display: flex; flex-direction: column; gap: 20px; max-height: 650px; overflow-y: auto; padding-right: 5px; }
        
        /* Стилі для завдань */
        .task-card { background: #f8f9fa; border-left: 4px solid #0056b3; padding: 15px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); margin-bottom: 15px; }
        .task-card h3 { font-size: 15px; margin-bottom: 10px; color: #495057; }
        
        /* Кнопки вибору відповіді */
        .options { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .option { padding: 10px 14px; border: 1px solid #ced4da; border-radius: 6px; cursor: pointer; background: white; font-size: 14px; transition: 0.2s; }
        .option:hover { background: #f1f3f5; border-color: #0056b3; }
        .option.selected { background: #e1ecf4; border-color: #0056b3; font-weight: bold; }
        .option.correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .option.wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        
        /* Таблиці */
        .info-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .info-table th, .info-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .info-table th { background-color: #e9ecef; }

        /* Кнопки керування */
        .btn { background-color: #0056b3; color: white; border: none; padding: 12px 24px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background-color: #004085; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .nav-footer { display: flex; justify-content: space-between; border-top: 2px solid #e9ecef; padding-top: 15px; }

        /* Поле для листа */
        textarea { width: 100%; height: 250px; padding: 15px; border: 2px solid #ced4da; border-radius: 8px; font-size: 15px; resize: vertical; margin-top: 10px; }
        .ai-box { margin-top: 15px; padding: 15px; border-radius: 6px; display: none; white-space: pre-line; border-left: 5px solid; }

        /* Фінальний екран результатів */
        .result-box { text-align: center; padding: 40px 20px; }
        .badge { display: inline-block; padding: 15px 30px; font-size: 28px; font-weight: bold; border-radius: 50px; margin: 20px 0; color: white; }
        .badge.b1 { background: #28a745; box-shadow: 0 4px 15px rgba(40,167,69,0.3); }
        .badge.a2 { background: #ffc107; color: #333; box-shadow: 0 4px 15px rgba(255,193,7,0.3); }
        .badge.fail { background: #dc3545; box-shadow: 0 4px 15px rgba(220,53,69,0.3); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="step-menu" class="menu-box">
        <h1>DTZ B1 Modellprüfungen</h1>
        <p style="color: #6c757d;">Оберіть модельний тест для тренування. Кожен тест містить блоки Hören, Lesen та Schreiben.</p>
        
        <div class="grid-tests">
            <button class="btn-test-select" onclick="initExam('modeltest1')">📝 Modeltest 1</button>
            <button class="btn-test-select" onclick="initExam('modeltest2')">📝 Modeltest 2</button>
            <button class="btn-test-select" onclick="initExam('modeltest2')">📝 Modeltest 3</button>
            <button class="btn-test-select" onclick="initExam('modeltest2')">📝 Modeltest 4</button>
            <button class="btn-test-select" onclick="initExam('modeltest2')">📝 Modeltest 5</button>
            <button class="btn-test-select" onclick="initExam('modeltest2')">📝 Modeltest 6</button>
            <button class="btn-test-select" onclick="initExam('modeltest2')">📝 Modeltest 7</button>
        </div>
    </div>

    <div id="exam-block" class="hidden">
        <div class="exam-header">
            <span id="current-section-title">HÖREN & LESEN</span>
            <span id="display-test-name"></span>
        </div>

        <div id="section-hoeren" class="hidden"></div>
        <div id="section-lesen" class="hidden"></div>
        <div id="section-schreiben" class="hidden"></div>

        <div class="nav-footer">
            <button class="btn" id="btn-check-answers" onclick="revealAnswers()">Überprüfen (Перевірити)</button>
            <button class="btn" id="btn-next-step" onclick="switchSection()">Далі ➔</button>
        </div>
    </div>

    <div id="step-results" class="hidden result-box">
        <h2>Prüfungsergebnis (Результат іспиту)</h2>
        <p style="color: #6c757d; margin-top: 10px;">Блоки Hören & Lesen успішно перевірено.</p>
        
        <div style="font-size: 22px; margin-top: 20px;">
            Ваш бал: <b id="score-text" style="color: #0056b3;">0</b> із <span id="total-questions-text">0</span> правильних відповідей
        </div>

        <div id="result-badge" class="badge">B1</div>

        <p id="result-desc" style="font-size: 16px; max-width: 600px; margin: 0 auto 30px auto; line-height: 1.5; color: #495057;"></p>
        
        <button class="btn" onclick="goToMenu()">➔ В головне меню</button>
    </div>
</div>

<script>
    // БАЗА ДАНИХ ТЕСТІВ
    const examDatabase = {
        "modeltest1": {
            name: "Modeltest 1",
            hoerenHTML: `
                <div style="text-align: center; padding: 20px; background: #f8f9fa; border-radius: 8px; margin-bottom: 20px;">
                    <p style="font-size: 18px; margin-bottom: 15px;">🎵 <b>Hören — Modeltest 1</b></p>
                    
                    <iframe src="https://drive.google.com/file/d/1cDKI09QcGMqaD20xrjr3-rGgftrIc8_v/preview" width="100%" height="80" allow="autoplay" style="border: none; border-radius: 8px;"></iframe>
                </div>
                
                <div class="task-card">
                    <h3>Aufgabe 1: Was soll Nina tun?</h3>
                    <div class="options">
                        <div class="option" onclick="setAnswer(this, true)">a) Die Eltern besuchen</div>
                        <div class="option" onclick="setAnswer(this, false)">b) Ein Taxi rufen</div>
                        <div class="option" onclick="setAnswer(this, false)">c) Mit den Koffern helfen</div>
                    </div>
                </div>

                <div class="task-card">
                    <h3>Aufgabe 2: Wie kommen die Fahrgäste schneller nach Mainz?</h3>
                    <div class="options">
                        <div class="option" onclick="setAnswer(this, false)">a) Aussteigen und einen anderen Zug nehmen</div>
                        <div class="option" onclick="setAnswer(this, true)">b) Am Flughafen umsteigen</div>
                        <div class="option" onclick="setAnswer(this, false)">c) In Köln umsteigen </div>
                    </div>
                </div>

                <div class="task-card">
                    <h3>Aufgabe 3: Wohin soll Herr Flemming kommen?</h3>
                    <div class="options">
                        <div class="option" onclick="setAnswer(this, false)">a) In die Schule.</div>
                        <div class="option" onclick="setAnswer(this, true)">b) Ins Café Milano. </div>
                        <div class="option" onclick="setAnswer(this, false)">c) Ins Landhaus Flora. </div>
                    </div>
                </div>
            `,
            lesenHTML: `
                <div class="split-screen">
                    <div class="left-panel">
                        <h3 style="color:#0056b3; margin-bottom:10px;">Infotafel Städtischer Bürgerservice</h3>
                        <table class="info-table">
                            <tr><th>Stockwerk</th><th>Ämter und Dienststellen</th></tr>
                            <tr><td><b>5. OG</b></td><td>Stadtentwicklung - Planungsamt - Baurecht</td></tr>
                            <tr><td><b>2. OG</b></td><td>Fahrzeugstelle (An-, Um- und Abmeldung von Kfz)</td></tr>
                            <tr><td><b>1. OG</b></td><td>Meldestelle (Personen) - Ausweisstelle (Pässe)</td></tr>
                            <tr><td><b>EG</b></td><td>Information/Wegweiser - Fundsachen - WC</td></tr>
                        </table>
                    </div>
                    <div class="right-panel">
                        <div class="task-card">
                            <h3>Aufgabe 21: Sie möchten Ihr Auto abmelden.</h3>
                            <div class="options">
                                <div class="option" onclick="setAnswer(this, false)">a) EG</div>
                                <div class="option" onclick="setAnswer(this, false)">b) 1. OG</div>
                                <div class="option" onclick="setAnswer(this, true)">c) anderes Stockwerk (Richtig: 2. OG)</div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            schreibenHTML: `
                <div class="task-card">
                    <p><b>Aufgabe Schreiben:</b> Ваш син захворів. Напишіть коротку записку вчительці Frau Berg.</p>
                </div>
                <textarea id="text-schreiben" placeholder="Schreiben Sie Ihren Brief hier..."></textarea>
                <button class="btn btn-success" style="margin-top: 10px;" onclick="validateLetterAI()">🤖 Перевірити граматику через AI</button>
                <div id="ai-response-box" class="ai-box"></div>
            `
        },
        "modeltest2": {
            name: "Modeltest 2",
            hoerenHTML: `
                <div style="text-align: center; padding: 20px; background: #e8f4fd; border-radius: 8px; margin-bottom: 20px;">
                    <p style="font-size: 18px; margin-bottom: 10px;">🎵 <b>Hören — Modeltest 2</b></p>
                </div>
                <div class="task-card">
                    <h3>Aufgabe 1: Durchsage am Bahnhof</h3>
                    <p>Auf welchem Gleis kommt der Zug aus München an?</p>
                    <div class="options">
                        <div class="option" onclick="setAnswer(this, false)">a) Gleis 3</div>
                        <div class="option" onclick="setAnswer(this, true)">b) Gleis 7 (Richtig)</div>
                        <div class="option" onclick="setAnswer(this, false)">c) Gleis 11</div>
                    </div>
                </div>
            `,
            lesenHTML: `
                <div class="split-screen">
                    <div class="left-panel">
                        <h3 style="color:#28a745; margin-bottom:10px;">Hausordnung & Sicherheit</h3>
                        <p style="font-size: 14px; line-height: 1.6;">Ab 22:00 Uhr gilt im gesamten Gebäude die Nachtруе. Die Haustür muss ab diesem Zeitpunkt stets verschlossen sein.</p>
                    </div>
                    <div class="right-panel">
                        <div class="task-card">
                            <h3>Aufgabe 21: Nach 22 Uhr muss die Haustür abgesперрт werden.</h3>
                            <div class="options">
                                <div class="option" onclick="setAnswer(this, true)">richtig (Richtig)</div>
                                <div class="option" onclick="setAnswer(this, false)">falsch</div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            schreibenHTML: `
                <div class="task-card">
                    <p><b>Aufgabe Schreiben:</b> Напишіть листа орендодавцю Herr Meyer з проханням відремонтувати опалення.</p>
                </div>
                <textarea id="text-schreiben" placeholder="Sehr geehrter Herr Meyer..."></textarea>
                <button class="btn btn-success" style="margin-top: 10px;" onclick="validateLetterAI()">🤖 Перевірити граматику через AI</button>
                <div id="ai-response-box" class="ai-box"></div>
            `
        }
    };
    "modeltest3": {
            name: "Modeltest 3",
            hoerenHTML: `
                <div style="text-align: center; padding: 20px; background: #e8f4fd; border-radius: 8px; margin-bottom: 20px;">
                    <p style="font-size: 18px; margin-bottom: 10px;">🎵 <b>Hören — Modeltest 3</b></p>
                </div>
                <div class="task-card">
                    <p>1-Wann werden die Möbel geliefert? </p>
                    <div class="options">
                        <div class="option" onclick="setAnswer(this, true)">a) Morgen Nachmittag.</div>
                        <div class="option" onclick="setAnswer(this, false)">b) Morgen um 9 Uhr.</div>
                        <div class="option" onclick="setAnswer(this, false)">c) Um 14 Uhr.</div>
                    </div>
                </div>

                <div class="task-card">
                    <p> 2-Wohin soll Frau Böhmer kommen?  </p>
                    <div class="options">
                        <div class="option" onclick="setAnswer(this, false)">a) In den Kindergarten.</div>
                        <div class="option" onclick="setAnswer(this, true)">b) Zur Agentur für Arbeit.</div>
                        <div class="option" onclick="setAnswer(this, false)">c) Um 14 Uhr.</div>
                    </div>
                </div>

                <div class="task-card">
                    <p> 3-Was ist heute besonders günstig?   </p>
                    <div class="options">
                        <div class="option" onclick="setAnswer(this, false)">a) Das Essen im Restaurant. </div>
                        <div class="option" onclick="setAnswer(this, false)">b) Damenmode. </div>
                        <div class="option" onclick="setAnswer(this, true)">c) Geschirr. </div>
                    </div>
                </div>
                   <div class="task-card">
                    <p> 4-Wo soll Herr Lee sein Auto abholen?  </p>
                    <div class="options">
                        <div class="option" onclick="setAnswer(this, false)">a)  Bei der Polizei.  </div>
                        <div class="option" onclick="setAnswer(this, false)">b) Bei einem Autohändler. </div>
                        <div class="option" onclick="setAnswer(this, true)">c) In der Werkstatt. </div>
                    </div>
                </div>
            `,
            lesenHTML: `
                <div class="split-screen">
                    <div class="left-panel">
                        <h3 style="color:#28a745; margin-bottom:10px;">Hausordnung & Sicherheit</h3>
                        <p style="font-size: 14px; line-height: 1.6;">Ab 22:00 Uhr gilt im gesamten Gebäude die Nachtруе. Die Haustür muss ab diesem Zeitpunkt stets verschlossen sein.</p>
                    </div>
                    <div class="right-panel">
                        <div class="task-card">
                            <h3>Aufgabe 21: Nach 22 Uhr muss die Haustür abgesперрт werden.</h3>
                            <div class="options">
                                <div class="option" onclick="setAnswer(this, true)">richtig (Richtig)</div>
                                <div class="option" onclick="setAnswer(this, false)">falsch</div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            schreibenHTML: `
                <div class="task-card">
                    <p><b>Aufgabe Schreiben:</b> Напишіть листа орендодавцю Herr Meyer з проханням відремонтувати опалення.</p>
                </div>
                <textarea id="text-schreiben" placeholder="Sehr geehrter Herr Meyer..."></textarea>
                <button class="btn btn-success" style="margin-top: 10px;" onclick="validateLetterAI()">🤖 Перевірити граматику через AI</button>
                <div id="ai-response-box" class="ai-box"></div>
            `
        }
    };



    
    let currentStep = 'hoeren';
    let activeTestData = null;

    function initExam(testKey) {
        activeTestData = examDatabase[testKey];
        currentStep = 'hoeren';
        
        document.getElementById('section-hoeren').innerHTML = activeTestData.hoerenHTML;
        document.getElementById('section-lesen').innerHTML = activeTestData.lesenHTML;
        document.getElementById('section-schreiben').innerHTML = activeTestData.schreibenHTML;

        document.getElementById('display-test-name').innerText = activeTestData.name;
        
        document.getElementById('step-menu').classList.add('hidden');
        document.getElementById('step-results').classList.add('hidden');
        document.getElementById('exam-block').classList.remove('hidden');
        setupStep();
    }

    function setupStep() {
        document.getElementById('section-hoeren').classList.add('hidden');
        document.getElementById('section-lesen').classList.add('hidden');
        document.getElementById('section-schreiben').classList.add('hidden');
        document.getElementById('btn-check-answers').classList.remove('hidden');

        if (currentStep === 'hoeren') {
            document.getElementById('current-section-title').innerText = "1. БЛОК: HÖREN";
            document.getElementById('section-hoeren').classList.remove('hidden');
            document.getElementById('btn-next-step').innerText = "До блоку Lesen ➔";
        } else if (currentStep === 'lesen') {
            document.getElementById('current-section-title').innerText = "2. БЛОК: LESEN";
            document.getElementById('section-lesen').classList.remove('hidden');
            document.getElementById('btn-next-step').innerText = "До блоку Schreiben ➔";
        } else if (currentStep === 'schreiben') {
            document.getElementById('current-section-title').innerText = "3. БЛОК: SCHREIBEN";
            document.getElementById('section-schreiben').classList.remove('hidden');
            document.getElementById('btn-check-answers').classList.add('hidden');
            document.getElementById('btn-next-step').innerText = "Завершити тест та підрахувати бали 🔄";
        }
    }

    function setAnswer(element, isCorrect) {
        const cardOptions = element.parentElement.querySelectorAll('.option');
        cardOptions.forEach(opt => opt.classList.remove('selected'));
        
        element.classList.add('selected');
        element.dataset.status = isCorrect ? "correct" : "wrong";
    }

    function revealAnswers() {
        const activeSectionId = currentStep === 'hoeren' ? 'section-hoeren' : 'section-lesen';
        const activeSection = document.getElementById(activeSectionId);
        
        activeSection.querySelectorAll('.option.selected').forEach(opt => {
            if (opt.dataset.status === "correct") {
                opt.classList.add('correct');
            } else {
                opt.classList.add('wrong');
            }
        });
        
        activeSection.querySelectorAll('.option').forEach(opt => {
            if (opt.getAttribute('onclick').includes('true')) {
                opt.classList.add('correct');
            }
        });
    }

    function switchSection() {
        if (currentStep === 'hoeren') {
            currentStep = 'lesen';
            setupStep();
        } else if (currentStep === 'lesen') {
            currentStep = 'schreiben';
            setupStep();
        } else {
            calculateTotalScore();
        }
    }

    // НОВА ФУНКЦІЯ ПІДРАХУНКУ БАЛІВ
    function calculateTotalScore() {
        const totalQuestions = document.querySelectorAll('#section-hoeren .task-card, #section-lesen .task-card').length;
        const correctAnswers = document.querySelectorAll('.option.selected[data-status="correct"]').length;

        document.getElementById('score-text').innerText = correctAnswers;
        document.getElementById('total-questions-text').innerText = totalQuestions;

        const badge = document.getElementById('result-badge');
        const desc = document.getElementById('result-desc');

        // Оцінювання на основі відсотка правильних відповідей (підходить для будь-якої кількості питань)
        const successRate = totalQuestions > 0 ? (correctAnswers / totalQuestions) : 0;

        // В оригінальному DTZ 45 питань: B1 це 33+ бали (33/45 = ~73%), A2 це 20 балів (20/45 = ~44%)
        if (successRate >= 0.73 || correctAnswers >= 33) { 
            badge.innerText = "Сертифікат: B1";
            badge.className = "badge b1";
            desc.innerHTML = "🎉 <b>Вітаємо!</b> Ви показали чудовий результат у частинах Hören & Lesen. Цей рівень балів відповідає оцінці <b>B1</b>. Якщо ваш лист у блоці Schreiben також написаний без критичних помилок, ви гарантовано успішно складаєте іспит!";
        } else if (successRate >= 0.44 || correctAnswers >= 20) {
            badge.innerText = "Сертифікат: A2";
            badge.className = "badge a2";
            desc.innerHTML = "👍 <b>Добре!</b> Ви набрали достатньо балів для отримання рівня <b>A2</b>. Щоб підняти результат до омріяного B1, зверніть увагу на завдання, в яких припустилися помилок, та спробуйте пройти тест ще раз.";
        } else {
            badge.innerText = "Nicht bestanden";
            badge.className = "badge fail";
            desc.innerHTML = "⚠️ <b>Недостатньо балів.</b> На жаль, набраних балів не вистачає для підтвердження мовного рівня. Не засмучуйтесь! Тренуйтеся більше з іншими модельними тестами, розбирайте тексти та спробуйте знову.";
        }

        document.getElementById('exam-block').classList.add('hidden');
        document.getElementById('step-results').classList.remove('hidden');
    }

    function goToMenu() {
        document.getElementById('step-results').classList.add('hidden');
        document.getElementById('step-menu').classList.remove('hidden');
    }

    async function validateLetterAI() {
        const textValue = document.getElementById('text-schreiben').value;
        const box = document.getElementById('ai-response-box');
        
        if (!textValue.trim()) { alert("Будь ласка, введіть ваш текст листа."); return; }
        
        box.style.display = "block";
        box.style.borderColor = "#ffc107";
        box.style.backgroundColor = "#fff3cd";
        box.innerText = "🤖 ШІ аналізує структуру речень та граматику вашого листа...";

        try {
            const res = await fetch("https://api.languagetoolplus.com/v2/check", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `text=${encodeURIComponent(textValue)}&language=de-DE`
            });
            const resultData = await res.json();

            if (resultData.matches.length === 0) {
                box.style.borderColor = "#28a745";
                box.style.backgroundColor = "#d4edda";
                box.innerHTML = "🎉 <b>Вказаний текст чудовий!</b> ШІ не виявив грубих помилок у вашому листі.";
            } else {
                box.style.borderColor = "#dc3545";
                box.style.backgroundColor = "#f8d7da";
                let report = `⚠️ <b>Знайдено помилок у тексті: ${resultData.matches.length}</b>\n\n`;
                
                resultData.matches.forEach((item, index) => {
                    const errorWord = textValue.substring(item.offset, item.offset + item.length);
                    report += `${index + 1}. Помилка у слові/фразі: <u><b>"${errorWord}"</b></u>\n`;
                    report += `    💡 Рекомендація ШІ: ${item.message}\n`;
                    if (item.replacements && item.replacements.length > 0) {
                        report += `    ✅ Правильно написати: "${item.replacements[0].value}"\n`;
                    }
                    report += `\n`;
                });
                box.innerHTML = report;
            }
        } catch (e) {
            box.style.borderColor = "#6c757d";
            box.innerText = "Помилка зв'язку з сервером перевірки граматики.";
        }
    }
</script>

</body>
</html>
